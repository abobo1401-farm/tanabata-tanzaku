<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<title>七夕 短冊ディスプレイ</title>
<link href="./tanabata-display_files/css2" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body {
    width: 1080px;
    height: 1920px;
    overflow: hidden;
    background: transparent;
    font-family: "Hiragino Sans", "Yu Gothic", sans-serif;
  }
  #stage {
    position: relative;
    width: 1080px;
    height: 1920px;
  }

  /* ===== 星レイヤー ===== */
  #starLayer {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }
  .star-item {
    position: absolute;
    display: flex;
    flex-direction: column;
    align-items: center;
    animation: starTwinkle 2.4s ease-in-out infinite;
  }
  .star-item .star-icon {
    font-size: 28px;
    filter: drop-shadow(0 0 8px rgba(255,230,120,0.9));
  }
  .star-item .star-name {
    font-size: 13px;
    color: #ffe9a8;
    text-shadow: 0 0 6px rgba(255,200,80,0.8), 0 1px 3px rgba(0,0,0,0.8);
    margin-top: 2px;
    white-space: nowrap;
    font-weight: bold;
  }
  @keyframes starTwinkle {
    0%, 100% { opacity: 0.85; transform: scale(1); }
    50% { opacity: 1; transform: scale(1.12); }
  }

  /* ===== 笹の木 ===== */
  .sasa {
    position: absolute;
    width: 620px;
    height: auto;
    z-index: 3;
    filter: drop-shadow(0 8px 16px rgba(0,0,0,0.25));
  }
  .sasa-left { left: -60px; bottom: -40px; }
  .sasa-right { right: -60px; bottom: -40px; transform: scaleX(-1); }

  /* ===== 短冊 ===== */
  .tanzaku {
    position: absolute;
    width: 64px;
    padding: 14px 6px;
    border-radius: 3px;
    box-shadow: 0 6px 14px rgba(0,0,0,0.3);
    cursor: pointer;
    z-index: 5;
    transform-origin: top center;
    animation: sway 3.4s ease-in-out infinite;
    font-size: 15px;
    line-height: 1.6;
    writing-mode: vertical-rl;
    text-align: start;
    display: flex;
    align-items: flex-start;
    justify-content: center;
    min-height: 130px;
    transition: box-shadow 0.2s;
  }
  .tanzaku::before {
    content: "";
    position: absolute;
    top: -14px; left: 50%;
    transform: translateX(-50%);
    width: 2px; height: 14px;
    background: rgba(255,255,255,0.7);
  }
  .tanzaku .wish-text { visibility: hidden; }
  .tanzaku .name-tag { display: none; }
  .tanzaku .wish-text { white-space: nowrap; }
  .tanzaku .launched-mark {
    position: absolute;
    top: -6px; right: -6px;
    font-size: 16px;
    filter: drop-shadow(0 0 4px rgba(255,220,80,0.9));
  }

  @keyframes sway {
    0%   { transform: rotate(calc(-1 * var(--sway, 3.5deg))); }
    50%  { transform: rotate(var(--sway, 3.5deg)); }
    100% { transform: rotate(calc(-1 * var(--sway, 3.5deg))); }
  }

  /* ===== ポップアップ ===== */
  #wishPopup {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    z-index: 100; background: rgba(0,0,0,0.5);
  }
  #wishPopup.show { display: flex; }
  .popup-card {
    width: 800px; padding: 40px 40px 36px;
    border-radius: 24px;
    box-shadow: 0 20px 50px rgba(0,0,0,0.4);
    text-align: center;
    animation: popIn 0.35s ease;
    overflow: hidden;
  }
  @keyframes popIn {
    from { transform: scale(0.7); opacity: 0; }
    to   { transform: scale(1); opacity: 1; }
  }
  .popup-card .pwish {
    font-size: 38px; font-weight: normal;
    font-family: "Zen Kurenaido", "Hiragino Sans", sans-serif;
    letter-spacing: 3px;
    line-height: 1.7; margin-bottom: 24px;
    writing-mode: horizontal-tb;
  }
  .popup-card .pname {
    font-size: 42px;
    font-family: "Zen Kurenaido", "Hiragino Sans", sans-serif;
    font-weight: normal;
    letter-spacing: 4px;
    opacity: 0.95;
    writing-mode: horizontal-tb; cursor: pointer;
    position: relative; min-height: 90px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 28px;
  }
  .popup-card .pname .name-real {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    opacity: 0; transition: opacity 0.6s ease;
    font-size: 80px;
    letter-spacing: 6px;
    text-shadow: 0 0 24px rgba(255,255,255,0.7);
    word-break: break-all;
    white-space: normal;
    padding: 0 16px;
    line-height: 1.2;
  }
  .popup-card .pname.revealed .name-real { opacity: 1; }
  .popup-card .pname .name-placeholder {
    opacity: 0.5; font-size: 18px;
    font-family: "Hiragino Sans", sans-serif;
    letter-spacing: 1px;
    transition: opacity 0.4s ease;
  }
  .popup-card .pname.revealed .name-placeholder { opacity: 0; }

  /* 打ち上げボタン */
  #launchBtn {
    display: block; width: 100%;
    padding: 16px 0; border: none; border-radius: 20px;
    background: linear-gradient(135deg, #1a1a4e, #2d2d8a);
    color: #ffe9a8; font-size: 22px; font-weight: bold;
    cursor: pointer; letter-spacing: 2px;
    box-shadow: 0 4px 16px rgba(0,0,100,0.4);
    transition: transform 0.15s;
  }
  #launchBtn:active { transform: scale(0.97); }
  #launchBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  #launchBtn.launched { background: linear-gradient(135deg, #3a3a3a, #555); color: #aaa; }

  /* ===== ロケット演出 ===== */
  #rocket {
    position: fixed; font-size: 52px;
    z-index: 200; pointer-events: none;
    display: none; filter: drop-shadow(0 0 10px rgba(255,150,50,0.8));
    transition: none;
  }
  #rocket.flying {
    display: block;
    animation: rocketFly 1.6s cubic-bezier(0.2, 0, 0.4, 1) forwards;
  }
  @keyframes rocketFly {
    0%   { transform: translateY(0) rotate(-45deg) scale(1); opacity: 1; }
    80%  { transform: translateY(-1400px) rotate(-45deg) scale(0.7); opacity: 1; }
    100% { transform: translateY(-1600px) rotate(-45deg) scale(0.5); opacity: 0; }
  }

  /* 爆発 */
  #explosion {
    position: fixed; font-size: 120px;
    z-index: 200; pointer-events: none;
    display: none; transform: translate(-50%, -50%);
  }
  #explosion.show {
    display: block;
    animation: explode 0.8s ease forwards;
  }
  @keyframes explode {
    0%   { transform: translate(-50%,-50%) scale(0.3); opacity: 1; }
    40%  { transform: translate(-50%,-50%) scale(1.4); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(2); opacity: 0; }
  }

  /* 成功バースト */
  #successBurst {
    position: fixed; inset: 0;
    display: none; align-items: center; justify-content: center;
    z-index: 200; pointer-events: none;
  }
  #successBurst.show { display: flex; }
  .success-text {
    font-size: 72px; font-weight: bold;
    color: #ffe9a8;
    text-shadow: 0 0 24px rgba(255,220,120,0.9), 0 0 48px rgba(255,220,120,0.6);
    animation: burstPop 2s ease forwards;
    text-align: center;
  }
  @keyframes burstPop {
    0%   { transform: scale(0.3); opacity: 0; }
    20%  { transform: scale(1.15); opacity: 1; }
    35%  { transform: scale(1); opacity: 1; }
    85%  { transform: scale(1); opacity: 1; }
    100% { transform: scale(1.3); opacity: 0; }
  }

  /* 流れ星演出（成功時） */
  .shooting-star {
    position: fixed; font-size: 36px;
    z-index: 199; pointer-events: none;
    animation: shootStar linear forwards;
  }
  @keyframes shootStar {
    0%   { transform: translate(0,0) rotate(30deg); opacity: 1; }
    100% { transform: translate(900px, 500px) rotate(30deg); opacity: 0; }
  }

  /* 失敗テキスト */
  #failText {
    position: fixed; top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-size: 64px; font-weight: bold;
    color: #ff6b6b; text-shadow: 0 0 20px rgba(255,80,80,0.8);
    z-index: 210; pointer-events: none;
    display: none;
  }
  #failText.show {
    display: block;
    animation: burstPop 1.6s ease forwards;
  }

  /* 爆発映像 */
  #explosionVideo {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    z-index: 200; pointer-events: none;
    display: none;
    background: #000;
  }
  #explosionVideo.show { display: block; }
</style>
</head>
<body>
<div id="stage">
  <div id="starLayer"><div class="star-item" style="left: 103.864px; top: 169.829px; animation-delay: 1.99079s;"><div class="star-icon">⭐</div><div class="star-name">お願いマッスル</div></div></div>
  <img class="sasa sasa-left" src="file:///C:/Users/abobo/Downloads/sasa.png" alt="">
  <img class="sasa sasa-right" src="file:///C:/Users/abobo/Downloads/sasa.png" alt="">
</div>

<div id="wishPopup">
  <div class="popup-card" id="popupCard">
    <div class="pwish" id="popupWish"></div>
    <div class="pname" id="popupName">
      <span class="name-placeholder">ー 誰の願い？（タップで答え合わせ）</span>
      <span class="name-real" id="popupNameReal"></span>
    </div>
    <button id="launchBtn">🚀 空に打ち上げる</button>
  </div>
</div>

<div id="rocket">🚀</div>
<div id="explosion">💥</div>
<div id="successBurst"><div class="success-text">⭐ 星になった！ ⭐</div></div>
<div id="failText">💥 撃ち落とされた…</div>
<video id="explosionVideo" src="explosion.mp4" playsinline=""></video>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, query, limitToLast, onValue, push, remove, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKwFPNTgPJawD47WxuDsJH2-V1E3zWqoU",
  authDomain: "utaoshi-ringo.firebaseapp.com",
  databaseURL: "https://utaoshi-ringo-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "utaoshi-ringo",
  storageBucket: "utaoshi-ringo.firebasestorage.app",
  messagingSenderId: "572385012765",
  appId: "1:572385012765:web:2f5542f69930f1a714eaf4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const MAX_TANZAKU = 50;
const stage = document.getElementById("stage");
const starLayer = document.getElementById("starLayer");

// ===== 短冊配置（画面下半分） =====
const POSITIONS = generatePositions(MAX_TANZAKU);
function generatePositions(count) {
  const zones = [
    { xMin: 60,  xMax: 420, yMin: 600, yMax: 1800 },
    { xMin: 620, xMax: 1000, yMin: 600, yMax: 1800 },
    { xMin: 380, xMax: 700, yMin: 600, yMax: 1600 },
  ];
  return Array.from({ length: count }, (_, i) => {
    const zone = zones[i % zones.length];
    return {
      x: zone.xMin + Math.random() * (zone.xMax - zone.xMin),
      y: zone.yMin + Math.random() * (zone.yMax - zone.yMin),
      sway: (2.5 + Math.random() * 2.5).toFixed(1),
      delay: Math.random() * 3
    };
  });
}

// ===== 星配置エリア（画面全体に散らばる） =====
const STAR_ZONES = { xMin: 40, xMax: 1040, yMin: 30, yMax: 860 };
const starPositions = new Map(); // id -> {x, y}
function getStarPosition(id) {
  if (!starPositions.has(id)) {
    starPositions.set(id, {
      x: STAR_ZONES.xMin + Math.random() * (STAR_ZONES.xMax - STAR_ZONES.xMin),
      y: STAR_ZONES.yMin + Math.random() * (STAR_ZONES.yMax - STAR_ZONES.yMin),
      delay: Math.random() * 2
    });
  }
  return starPositions.get(id);
}

// ===== 現在表示中のポップアップアイテム =====
let currentItem = null;
let launchLocked = false;

const tanzakuEls = new Map();
const starEls = new Map();
let isInitialLoad = true;

// ===== 短冊レンダリング =====
function renderList(items) {
  // 全部消してから描画し直す（確実な方式）
  tanzakuEls.forEach(el => el.remove());
  tanzakuEls.clear();

  items.forEach((item, idx) => {
    const pos = POSITIONS[idx % POSITIONS.length];
    const el = document.createElement("div");
    el.className = "tanzaku";
    el.style.left = pos.x + "px";
    el.style.top = pos.y + "px";
    el.style.background = item.color || "#e8534f";
    el.style.color = item.textColor || "#fff";
    el.style.animationDelay = pos.delay + "s";
    el.style.setProperty("--sway", pos.sway + "deg");

    const wishSpan = document.createElement("div");
    wishSpan.className = "wish-text";
    wishSpan.textContent = item.wish;
    const nameSpan = document.createElement("div");
    nameSpan.className = "name-tag";
    nameSpan.textContent = item.name;
    el.appendChild(wishSpan);
    el.appendChild(nameSpan);
    el.addEventListener("click", () => showPopup(item));
    stage.appendChild(el);
    tanzakuEls.set(item.id, el);
  });

  isInitialLoad = false;
}

// ===== ポップアップ =====
function showPopup(item) {
  currentItem = item;
  launchLocked = false;

  const popup = document.getElementById("wishPopup");
  const card = document.getElementById("popupCard");
  const nameEl = document.getElementById("popupName");
  const launchBtn = document.getElementById("launchBtn");

  document.getElementById("popupWish").textContent = item.wish;
  document.getElementById("popupNameReal").textContent = "ー " + item.name;
  nameEl.classList.remove("revealed");

  card.style.background = item.color || "#e8534f";
  card.style.color = item.textColor || "#fff";

  if (item.launched) {
    launchBtn.textContent = "☆ 星になりました";
    launchBtn.classList.add("launched");
    launchBtn.disabled = true;
  } else {
    launchBtn.textContent = "🚀 空に打ち上げる";
    launchBtn.classList.remove("launched");
    launchBtn.disabled = false;
  }

  popup.classList.add("show");
  clearTimeout(window._popupTimer);
}

document.getElementById("popupName").addEventListener("click", (e) => {
  e.stopPropagation();
  const nameEl = document.getElementById("popupName");
  if (!nameEl.classList.contains("revealed")) {
    nameEl.classList.add("revealed");
    clearTimeout(window._popupTimer);
    window._popupTimer = setTimeout(() => {
      document.getElementById("wishPopup").classList.remove("show");
    }, 6000);
  }
});

document.getElementById("wishPopup").addEventListener("click", (e) => {
  if (e.target.id === "wishPopup") {
    clearTimeout(window._popupTimer);
    e.currentTarget.classList.remove("show");
  }
});

// ===== 打ち上げボタン =====
document.getElementById("launchBtn").addEventListener("click", () => {
  if (!currentItem || launchLocked || currentItem.launched) return;
  launchLocked = true;
  document.getElementById("launchBtn").disabled = true;

  const popup = document.getElementById("wishPopup");
  popup.classList.remove("show");
  clearTimeout(window._popupTimer);

  // ロケット打ち上げアニメーション
  const rocket = document.getElementById("rocket");
  rocket.classList.add("flying");
  rocket.style.left = "480px";
  rocket.style.top = "900px";

  setTimeout(() => {
    rocket.classList.remove("flying");

    // 50%抽選
    const success = Math.random() < 0.5;
    if (success) {
      showSuccess(currentItem);
    } else {
      showFailure();
    }
  }, 1600);
});

// ===== 効果音 =====
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx || audioCtx.state === "closed") {
    const AC = window.AudioContext || window.webkitAudioContext;
    if (!AC) return null;
    audioCtx = new AC();
  }
  if (audioCtx.state === "suspended") audioCtx.resume();
  return audioCtx;
}

function playSuccessSound() {
  const ctx = getAudioCtx();
  if (!ctx) return;
  const now = ctx.currentTime;
  // キラキラ上昇音（複数の音を重ねる）
  const notes = [523, 659, 784, 1047, 1319];
  notes.forEach((freq, i) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = "sine";
    osc.frequency.setValueAtTime(freq, now + i * 0.12);
    gain.gain.setValueAtTime(0.0001, now + i * 0.12);
    gain.gain.exponentialRampToValueAtTime(0.18, now + i * 0.12 + 0.04);
    gain.gain.exponentialRampToValueAtTime(0.0001, now + i * 0.12 + 0.3);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(now + i * 0.12);
    osc.stop(now + i * 0.12 + 0.35);
  });
  // キラキラ高音（三角波）
  const shimmer = ctx.createOscillator();
  const shimmerGain = ctx.createGain();
  shimmer.type = "triangle";
  shimmer.frequency.setValueAtTime(2093, now + 0.3);
  shimmer.frequency.exponentialRampToValueAtTime(4186, now + 0.9);
  shimmerGain.gain.setValueAtTime(0.0001, now + 0.3);
  shimmerGain.gain.exponentialRampToValueAtTime(0.12, now + 0.4);
  shimmerGain.gain.exponentialRampToValueAtTime(0.0001, now + 1.0);
  shimmer.connect(shimmerGain);
  shimmerGain.connect(ctx.destination);
  shimmer.start(now + 0.3);
  shimmer.stop(now + 1.1);
}


// ===== 成功演出 =====
function showSuccess(item) {
  playSuccessSound();

  // 流れ星
  for (let i = 0; i < 5; i++) {
    const s = document.createElement("div");
    s.className = "shooting-star";
    s.textContent = "🌟";
    s.style.left = (Math.random() * 400) + "px";
    s.style.top = (Math.random() * 600 + 100) + "px";
    s.style.animationDuration = (0.8 + Math.random() * 0.6) + "s";
    s.style.animationDelay = (Math.random() * 0.5) + "s";
    document.body.appendChild(s);
    setTimeout(() => s.remove(), 2000);
  }

  // バーストテキスト
  const burst = document.getElementById("successBurst");
  burst.classList.add("show");
  setTimeout(() => burst.classList.remove("show"), 2000);

  // 星を先に保存してから短冊を削除
  push(ref(db, "tanabata/stars"), {
    name: item.name,
    wish: item.wish,
    color: item.color || "#e8534f",
    createdAt: serverTimestamp()
  }).then(() => {
    remove(ref(db, `tanabata/tanzaku/${item.id}`));
  });
}

// ===== 失敗演出 =====
function showFailure() {
  // 失敗時も短冊を削除
  if (currentItem) {
    remove(ref(db, `tanabata/tanzaku/${currentItem.id}`));
  }

  const video = document.getElementById("explosionVideo");
  video.classList.add("show");
  video.currentTime = 0;
  video.play().catch(() => { fallbackExplosion(); });
  video.onended = () => { video.classList.remove("show"); video.onended = null; };
  setTimeout(() => {
    if (video.classList.contains("show")) { video.pause(); video.classList.remove("show"); }
  }, 5000);
}

function fallbackExplosion() {
  const explosion = document.getElementById("explosion");
  explosion.style.left = "540px";
  explosion.style.top = "400px";
  explosion.classList.add("show");
  setTimeout(() => explosion.classList.remove("show"), 900);

  const failText = document.getElementById("failText");
  failText.classList.add("show");
  setTimeout(() => failText.classList.remove("show"), 1700);
}

// ===== Firebase リアルタイム（短冊） =====
const tanzakuQuery = query(ref(db, "tanabata/tanzaku"), limitToLast(MAX_TANZAKU));
onValue(tanzakuQuery, (snapshot) => {
  const data = snapshot.val() || {};
  const items = Object.entries(data).map(([id, v]) => ({ id, ...v }));
  items.sort((a, b) => (a.createdAt || 0) - (b.createdAt || 0));
  renderList(items);
});

// ===== Firebase リアルタイム（星） =====
onValue(ref(db, "tanabata/stars"), (snapshot) => {
  const data = snapshot.val() || {};
  const starIds = new Set(Object.keys(data));

  // 消えた星を削除
  [...starEls.entries()]
    .filter(([id]) => !starIds.has(id))
    .forEach(([id, el]) => { el.remove(); starEls.delete(id); });

  // 新しい星を追加
  Object.entries(data).forEach(([id, v]) => {
    if (starEls.has(id)) return;
    const pos = getStarPosition(id);
    const el = document.createElement("div");
    el.className = "star-item";
    el.style.left = pos.x + "px";
    el.style.top = pos.y + "px";
    el.style.animationDelay = pos.delay + "s";
    el.innerHTML = `<div class="star-icon">⭐</div><div class="star-name">${v.name || ""}</div>`;
    starLayer.appendChild(el);
    starEls.set(id, el);
  });
});
</script>


</body></html>
