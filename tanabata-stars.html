<title>七夕 星カウント</title>
<style>
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    background: linear-gradient(180deg, #0b1d3a 0%, #163a5c 50%, #0b1d3a 100%);
    font-family: "Zen Kurenaido", "Hiragino Sans", sans-serif;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 40px 16px 60px;
  }
  h1 { font-size: 24px; margin-bottom: 6px; opacity: 0.9; }
  .sub { font-size: 13px; opacity: 0.6; margin-bottom: 36px; }

  .count-box {
    background: rgba(255,255,255,0.07);
    border: 1px solid rgba(255,200,80,0.4);
    border-radius: 24px;
    padding: 32px 48px;
    text-align: center;
    margin-bottom: 36px;
    box-shadow: 0 0 30px rgba(255,200,80,0.15);
  }
  .count-label { font-size: 16px; opacity: 0.8; margin-bottom: 8px; }
  .count-num {
    font-size: 96px;
    font-weight: bold;
    color: #ffe9a8;
    text-shadow: 0 0 24px rgba(255,220,120,0.8);
    line-height: 1;
  }
  .count-unit { font-size: 28px; opacity: 0.8; margin-top: 8px; }

  .star-list {
    width: 100%;
    max-width: 480px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .star-item {
    display: flex;
    align-items: center;
    gap: 14px;
    padding: 14px 18px;
    border-radius: 14px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,200,80,0.2);
  }
  .star-icon { font-size: 24px; }
  .star-info { flex: 1; }
  .star-name { font-size: 20px; color: #ffe9a8; }
  .star-wish { font-size: 13px; opacity: 0.7; margin-top: 2px; }
  .empty { opacity: 0.5; font-size: 15px; padding: 40px; }

  .stars-bg { position: fixed; inset: 0; z-index: -1; overflow: hidden; }
  .bg-star {
    position: absolute;
    background: #fff;
    border-radius: 50%;
    animation: twinkle linear infinite;
  }
  @keyframes twinkle {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 1; }
  }
</style>
</head>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDKwFPNTgPJawD47WxuDsJH2-V1E3zWqoU",
  authDomain: "utaoshi-ringo.firebaseapp.com",
  databaseURL: "https://utaoshi-ringo-default-rtdb.asia-southeast1.firebasedatabase.app",
  projectId: "utaoshi-ringo",
  storageBucket: "utaoshi-ringo.firebasestorage.app",
  messagingSenderId: "572385012765",
  appId: "1:572385012765:web:2f5542f69930f1a714eaf4"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

onValue(ref(db, "tanabata/stars"), (snapshot) => {
  const data = snapshot.val() || {};
  const items = Object.entries(data)
    .map(([id, v]) => ({ id, ...v }))
    .sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));

  document.getElementById("countNum").textContent = items.length;

  const list = document.getElementById("starList");
  if (items.length === 0) {
    list.innerHTML = '<div class="empty">まだ星がありません🌙</div>';
    return;
  }
  list.innerHTML = "";
  items.forEach(item => {
    const div = document.createElement("div");
    div.className = "star-item";
    div.innerHTML = `
      <div class="star-icon">⭐</div>
      <div class="star-info">
        <div class="star-name">${escapeHtml(item.name)}</div>
        <div class="star-wish">${escapeHtml(item.wish)}</div>
      </div>
    `;
    list.appendChild(div);
  });
});

function escapeHtml(str) {
  const d = document.createElement("div");
  d.textContent = str || "";
  return d.innerHTML;
}

// 背景の星
const bg = document.getElementById("starsBg");
for (let i = 0; i < 60; i++) {
  const s = document.createElement("div");
  s.className = "bg-star";
  const size = Math.random() * 2 + 1;
  s.style.width = size + "px";
  s.style.height = size + "px";
  s.style.left = Math.random() * 100 + "%";
  s.style.top = Math.random() * 100 + "%";
  s.style.animationDuration = (2 + Math.random() * 3) + "s";
  s.style.animationDelay = (Math.random() * 3) + "s";
  bg.appendChild(s);
}
</script>
